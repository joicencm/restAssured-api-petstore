name: CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests
        run: |
          mvn test --batch-mode \
          -Dauth.password=${{ secrets.AUTH_PASSWORD }} \
          -Dauth.client.secret=${{ secrets.AUTH_CLIENT_SECRET }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/allure-results/

  generate-report:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: target/

      - name: Generate Allure Report
        run: mvn allure:report --batch-mode

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          publish_branch: gh-pages
          keep_files: true